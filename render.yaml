services:
  - type: web
    name: credit-xai-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python download_models.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_REPO
        value: RoopakSai15/credit-xai-models
      - key: HF_TOKEN
        sync: false
    healthCheckPath: /
